<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anket</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

    <section id="header">
        <div class="container-fluid p-0">
            <div class="text-center py-4 bg-white">
                <h2 class="text-danger">Evden Çalışma Anketi</h2>
            </div>
        </div>
        <div class="result d-none py-4 bg-white text-center">
            <div class="container lead">
                <p><span class="text-danger display-4 py-4">%0 </span>Ofise Dönmek İstiyorsun</p>
            </div>

        </div>
    </section>

    <section id="questions">
        <div class="container-fluid p-0">
            <div class="bg-secondary text-white p-4 min-vh-100">

                <form class="question-form">

                    <!-- Soru 1 -->
                    <div class="mb-4">
                        <p>1. Ofiste daha verimli çalışıyorum</p>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q1"
                                value="E"
                                id="q1e"
                                checked>

                            <label class="form-check-label" for="q1e">
                                Evet
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q1"
                                value="H"
                                id="q1h">

                            <label class="form-check-label" for="q1h">
                                Hayır
                            </label>
                        </div>
                    </div>

                    <!-- Soru 2 -->
                    <div class="mb-4">
                        <p>2. Ofise tam zamanlı dönmek istiyorum</p>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q2"
                                value="E"
                                id="q2e"
                                checked>

                            <label class="form-check-label" for="q2e">
                                Evet
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q2"
                                value="H"
                                id="q2h">

                            <label class="form-check-label" for="q2h">
                                Hayır
                            </label>
                        </div>
                    </div>

                    <!-- Soru 3 -->
                    <div class="mb-4">
                        <p>3. Evdeyken teknik sorunlar daha hızlı çözülüyor</p>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q3"
                                value="E"
                                id="q3e"
                                checked>

                            <label class="form-check-label" for="q3e">
                                Evet
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q3"
                                value="H"
                                id="q3h">

                            <label class="form-check-label" for="q3h">
                                Hayır
                            </label>
                        </div>
                    </div>

                    <!-- Soru 4 -->
                    <div class="mb-4">
                        <p>4. Evdeyken Jira'daki haftalık görevleri yetiştirmekte zorlanıyorum</p>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q4"
                                value="E"
                                id="q4e"
                                checked>

                            <label class="form-check-label" for="q4e">
                                Evet
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q4"
                                value="H"
                                id="q4h">

                            <label class="form-check-label" for="q4h">
                                Hayır
                            </label>
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-light">
                            Gönder
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script src="script.js"></script>

</body>
</html>
