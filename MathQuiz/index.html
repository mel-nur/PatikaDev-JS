<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

    <section id="header">
        <div class="container-fluid p-0">
            <div class="text-center py-4 bg-white">
                <h2 class="text-danger">Matematik Quiz</h2>
            </div>
        </div>
        <div class="result d-none py-4 bg-white text-center">
            <div class="container lead">
                <p><span class="text-danger display-4 py-4">%0 </span>Puanınız</p>
                <p class="d-none" id="text">Tebrikler başka modüle geçebilirsiniz</p>
            </div>

        </div>
    </section>

    <section id="questions">
        <div class="container-fluid p-0">
            <div class="bg-secondary text-white p-4 min-vh-100">

                <form class="question-form">

                    <!-- Soru 1 -->
                    <div class="mb-4">
                        <p>1. 10 * 5 = ?</p>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q1"
                                value="50"
                                id="q1e">

                            <label class="form-check-label" for="q1e">
                                50
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q1"
                                value="5"
                                id="q1h">

                            <label class="form-check-label" for="q1h">
                                5
                            </label>
                        </div>
                    </div>

                    <!-- Soru 2 -->
                    <div class="mb-4">
                        <p>5 + 7 = ?</p>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q2"
                                value="12"
                                id="q2e">

                            <label class="form-check-label" for="q2e">
                                12
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q2"
                                value="6"
                                id="q2h">

                            <label class="form-check-label" for="q2h">
                                6
                            </label>
                        </div>
                    </div>

                    <!-- Soru 3 -->
                    <div class="mb-4">
                        <p>100 - 55 = ?</p>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q3"
                                value="45"
                                id="q3e">

                            <label class="form-check-label" for="q3e">
                                45
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q3"
                                value="60"
                                id="q3h">

                            <label class="form-check-label" for="q3h">
                                60
                            </label>
                        </div>
                    </div>

                    <!-- Soru 4 -->
                    <div class="mb-4">
                        <p>50 % 5 = ?</p>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q4"
                                value="10"
                                id="q4e">

                            <label class="form-check-label" for="q4e">
                                10
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input"
                                type="radio"
                                name="q4"
                                value="5"
                                id="q4h">

                            <label class="form-check-label" for="q4h">
                                5
                            </label>
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-light">
                            Gönder
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script src="script.js"></script>

</body>
</html>
